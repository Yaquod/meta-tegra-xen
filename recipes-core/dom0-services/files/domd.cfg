name     = "DomD"
kernel   = "/boot/Image"
extra    = "root=/dev/xvda rw console=hvc0 module_blacklist=nvhwpm systemd.mask=jtop.service systemd.mask=nvpmodel.service systemd.mask=nvpower.service"
memory   = 4096
vcpus    = 4
disk     = ['/dev/mmcblk0p16,raw,xvda,w']
vif      = ['bridge=xenbr0']
iommu    = 1
passthrough = "enabled"

device_tree = "/root/domd.dtb"
