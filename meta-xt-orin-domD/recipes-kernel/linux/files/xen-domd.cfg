# Xen guest infrastructure
CONFIG_XEN=y
CONFIG_XEN_DOM0=y                  # DomD acts as a privileged domain
CONFIG_XEN_VIRTIO=y                # virtio transports work under Xen
CONFIG_HVC_XEN=y                   # hvc0 console
CONFIG_HVC_XEN_FRONTEND=y
CONFIG_XEN_GRANT_TABLE=y           # grant tables (needed by virtio/block/net)
CONFIG_XEN_GNTDEV=y
CONFIG_XEN_BACKEND=y               # backend driver support (blkback, netback)
CONFIG_XEN_BLKDEV_BACKEND=y        # block backend for DomU disk (xvda)
CONFIG_XEN_NETDEV_BACKEND=y        # net backend for DomU vif

# virtio (disk + network frontends used by DomU)
CONFIG_VIRTIO=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_BLK=y
CONFIG_VIRTIO_NET=y
CONFIG_VHOST=y
CONFIG_VHOST_VSOCK=y               # host-side vsock for SCUDA transport
CONFIG_VSOCKETS=y
CONFIG_VSOCKETS_DIAG=y

# IOMMU / SMMU for GPU passthrough isolation
CONFIG_IOMMU_SUPPORT=y
CONFIG_ARM_SMMU=y                  # ARM SMMU-500 (smmu_niso0)
CONFIG_ARM_SMMU_V3=y               # ARM SMMUv3 (smmu_niso1, owns GPU SID 0x07)
CONFIG_TEGRA_IOMMU_SMMU=y          # Tegra-specific SMMU glue
CONFIG_IOMMU_IO_PGTABLE_ARMV7S=y   # page table format used by SMMU-500
CONFIG_IOMMU_DMA=y                 # DMA-API <-> IOMMU bridge

# GPU (nvgpu / ga10b)
CONFIG_TEGRA_HOST1X=y              # host1x channel/syncpoint driver
CONFIG_DRM=y
CONFIG_DRM_TEGRA=y                 # Tegra DRM (host1x DRM bridge)
# CONFIG_DRM_VIRTIO_GPU is intentionally NOT set:
# DomD uses direct nvgpu passthrough, not virtio-gpu.
CONFIG_DRM_VIRTIO_GPU=m

# MMC / storage (DomD owns eMMC directly)
CONFIG_MMC=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_TEGRA=y

# Network bridge (xenbr0 for DomU vif)
CONFIG_BRIDGE=y
CONFIG_BRIDGE_NETFILTER=y
CONFIG_STP=y

# XenFS for DomD <-> Dom0 communication
CONFIG_XENFS=y
CONFIG_XEN_COMPAT_XENFS=y
CONFIG_XEN_SYS_HYPERVISOR=y
CONFIG_XEN_PRIVCMD=y               # /dev/xen/privcmd for xl toolstack