# Xen Dom0 Kernel Configuration for Jetson Orin Nano

# Core Xen support
CONFIG_XEN=y
CONFIG_XEN_DOM0=y
CONFIG_XEN_PRIVILEGED_GUEST=y
CONFIG_XEN_BACKEND=y

# Xen console
CONFIG_HVC_DRIVER=y
CONFIG_HVC_XEN=y
CONFIG_HVC_XEN_FRONTEND=y

# Xen block device backend
CONFIG_XEN_BLKDEV_BACKEND=y
CONFIG_XEN_BLKDEV_FRONTEND=y

# Xen network device backend
CONFIG_XEN_NETDEV_BACKEND=y
CONFIG_XEN_NETDEV_FRONTEND=y

# Xen SCSI backend
CONFIG_XEN_SCSI_BACKEND=y
CONFIG_XEN_SCSI_FRONTEND=y

# PCI passthrough
CONFIG_XEN_PCIDEV_BACKEND=y
CONFIG_XEN_PCIDEV_FRONTEND=y

# Xen balloon driver
CONFIG_XEN_BALLOON=y
CONFIG_XEN_BALLOON_MEMORY_HOTPLUG=y
CONFIG_XEN_SCRUB_PAGES=y

# Xen event channels
CONFIG_XEN_DEV_EVTCHN=y

# Xen filesystem
CONFIG_XEN_SYS_HYPERVISOR=y
CONFIG_XEN_XENBUS_FRONTEND=y

# Grant device support
CONFIG_XEN_GNTDEV=y
CONFIG_XEN_GRANT_DEV_ALLOC=y
CONFIG_XEN_GRANT_DMA_ALLOC=y

# Xen SWIOTLB
CONFIG_SWIOTLB=y
CONFIG_SWIOTLB_XEN=y

# SMMU/IOMMU support
CONFIG_IOMMU_SUPPORT=y
CONFIG_ARM_SMMU=y
CONFIG_ARM_SMMU_V3=y
CONFIG_IOMMU_IO_PGTABLE_LPAE=y
CONFIG_IOMMU_IO_PGTABLE_LPAE_SELFTEST=n
CONFIG_IOMMU_DEFAULT_PASSTHROUGH=n
CONFIG_IOMMU_DMA=y

# Virtio for inter-domain communication
CONFIG_VIRTIO=y
CONFIG_VIRTIO_MENU=y
CONFIG_VIRTIO_PCI=y
CONFIG_VIRTIO_PCI_LEGACY=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
CONFIG_VIRTIO_BLK=y
CONFIG_VIRTIO_NET=y
CONFIG_VIRTIO_CONSOLE=y
CONFIG_VIRTIO_BALLOON=y
CONFIG_VIRTIO_INPUT=y

# Block device backend
CONFIG_BLK_DEV_LOOP=y
CONFIG_BLK_DEV_NBD=y

# Network bridge (for DomU networking)
CONFIG_BRIDGE=y
CONFIG_BRIDGE_VLAN_FILTERING=y
CONFIG_NETFILTER=y
CONFIG_NETFILTER_ADVANCED=y
CONFIG_BRIDGE_NETFILTER=y

# Required for Xen on ARM
CONFIG_ARM64_SW_TTBR0_PAN=y
CONFIG_ARM64_TAGGED_ADDR_ABI=y

# Realtek Ethernet and Wi-Fi Drivers
CONFIG_RTW88=m
CONFIG_RTW88_CORE=m
CONFIG_RTW88_PCI=m
CONFIG_RTW88_8822C=m
CONFIG_RTW88_8822CE=m
CONFIG_R8169=m