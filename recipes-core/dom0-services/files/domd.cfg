name     = "DomD"
kernel   = "/boot/Image"
extra    = "root=/dev/xvda rw console=hvc0"
memory   = 4096
vcpus    = 4
disk     = ['/dev/mmcblk0p16,raw,xvda,w']
vif      = ['bridge=xenbr0']

# GPU MMIO passthrough (ga10b @ 0x17000000)
# reg = <0x17000000 size 0x1000000>, <0x18000000 size 0x1000000>, <0x3b41000 size 0x1000>
iomem    = ["0x17000,0x1000",    # GPU BAR0 - 16MB (in 4K pages: 0x1000 pages)
            "0x18000,0x1000",    # GPU BAR1 - 16MB
            "0x3b41,0x1"]        # GPU config - 4KB

# GPU interrupts (from DTS: SPI 0x44, 0x46, 0x47, 0x43 → GIC SPI = number + 32)
irqs     = [100, 102, 103, 99]   # stall0, stall1, stall2, nonstall