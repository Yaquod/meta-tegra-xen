# Minimal working Xen config for ARM without PCI
CONFIG_ARM=y
CONFIG_ARM_64=y
CONFIG_ARM_EFI=y
CONFIG_EXPERT=y
CONFIG_ALL_PLAT=y

# Essential features
CONFIG_GRANT_TABLE=y
CONFIG_SCHED_CREDIT2=y
CONFIG_SCHED_CREDIT2_DEFAULT=y
CONFIG_HAS_PASSTHROUGH=y
CONFIG_HAS_DEVICE_TREE=y

# Early printk
#CONFIG_EARLY_PRINTK=y
#CONFIG_EARLY_UART_CHOICE_8250=y
#CONFIG_EARLY_UART_BASE_ADDRESS=0x03100000
#CONFIG_EARLY_UART_8250_REG_SHIFT=2
CONFIG_SERRORS_FIXED_TRIAGE=n

# GIC and SMMU
CONFIG_GICV3=y
#CONFIG_ARM_SMMU=y

# Debug
CONFIG_DEBUG=y
CONFIG_FRAME_POINTER=y
CONFIG_DEBUG_INFO=y
