name     = "DomD"
kernel   = "/boot/Image"
extra    = "root=/dev/xvda rw console=hvc0"
memory   = 4096
vcpus    = 4
disk     = ['/dev/mmcblk0p16,raw,xvda,w']
vif      = ['bridge=xenbr0']

# GPU MMIO passthrough (ga10b @ 0x17000000)
# BAR0: 0x17000, BAR1: 0x18000, Config: 0x3b41
iomem    = ["0x17000,0x1000", "0x18000,0x1000", "0x3b41,0x1"]

# GPU interrupts (SPI 0x44, 0x46, 0x47, 0x43)
irqs     = [100, 102, 103, 99]