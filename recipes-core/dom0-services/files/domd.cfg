name    = "DomD"
kernel  = "/boot/Image"
extra   = "root=/dev/xvda1 rw console=hvc0"
memory  = 4096
vcpus   = 4

# GPU platform device passthrough via Xen dtdev
# Tegra234 GPU is not a PCIe device — use ARM SMMU + dtdev
dtdev   = ["/host1x@13e00000", "/gpu@17000000"]
iomem   = ["0x17000000,0x400"]

# PV backends for DomU
vif     = ['bridge=xenbr0']
disk    = ['xt-backend:/dev/nvme0n1p2,xvda,w']

# QEMU device model: virtio-gpu with virgl for DomU graphics
device_model_version = "qemu-xen"
device_model_args    = [
    "-device", "virtio-gpu-gl,virgl=on",
    "-display", "egl-headless",
    "-object", "memory-backend-memfd,id=mem1,size=512M",
    "-machine", "memory-backend=mem1"
]