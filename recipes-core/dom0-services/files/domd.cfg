name     = "DomD"
kernel   = "/boot/Image"
extra    = "root=/dev/xvda rw console=hvc0"
memory   = 4096
vcpus    = 4
disk     = ['/dev/mmcblk0p16,raw,xvda,w']
vif      = ['bridge=xenbr0']

# Automatically pass through Host1x and its child GPU
# Xen will read the DTB and map all MMIO and IRQs automatically
dtb = "/boot/tegra234-domd.dtb"
dtdev = ["/host1x@13e00000", "/gpu@17000000"]