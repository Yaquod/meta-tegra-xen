# Minimal working Xen config for ARM without PCI
CONFIG_ARM=y
CONFIG_ARM_64=y
CONFIG_ARM_EFI=y
CONFIG_EXPERT=y
CONFIG_ALL_PLAT=y

# Essential features
CONFIG_GRANT_TABLE=y
CONFIG_SCHED_CREDIT2=y
CONFIG_SCHED_CREDIT2_DEFAULT=y
CONFIG_HAS_PASSTHROUGH=y
CONFIG_HAS_DEVICE_TREE=y
CONFIG_SERRORS_FIXED_TRIAGE=n

# GIC and SMMU
CONFIG_GICV3=y
CONFIG_ARM_SMMU=y

# Debug
CONFIG_DEBUG=y
CONFIG_FRAME_POINTER=y
CONFIG_DEBUG_INFO=y
